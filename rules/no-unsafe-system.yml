id: no-unsafe-system
language: ucode
severity: error
message: >
  system() with a dynamic string argument passes commands through /bin/sh,
  creating a command-injection risk. Use the array form instead:
  system(["/path/to/cmd", arg1, arg2]) executes without a shell and is safe
  even with untrusted arguments.
rule:
  any:
    - pattern: system($CMD)
    - pattern: system($CMD, $TIMEOUT)
constraints:
  CMD:
    not:
      any:
        - kind: string
        - kind: array
        - all:
            - kind: template_string
            - not:
                has:
                  kind: template_substitution
