id: no-array-destructuring
language: ucode
severity: error
message: >
  Array destructuring is not valid ucode syntax.
  Use explicit index access instead: `let a = arr[0]; let b = arr[1];`
rule:
  all:
    - kind: assignment_expression
    - has:
        all:
          - kind: subscript_expression
          - has:
              pattern: let
        stopBy: neighbor
