id: no-assignment-in-condition
language: ucode
severity: error
message: >
  Assignment inside a condition is almost certainly a bug — use `===` to
  compare, or move the assignment before the condition.
rule:
  all:
    - kind: assignment_expression
    - inside:
        any:
          - kind: if_statement
          - kind: while_statement
          - kind: ternary_expression
          - kind: for_statement
        field: condition
        stopBy:
          any:
            - kind: function_expression
            - kind: arrow_function
