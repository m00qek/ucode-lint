name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Check out ucode-lint
        uses: actions/checkout@v4
        with:
          path: ucode-lint

      # tree-sitter-ucode is a file: sibling dependency; clone it at the
      # same level so the relative path ../tree-sitter-ucode resolves correctly.
      - name: Check out tree-sitter-ucode
        uses: actions/checkout@v4
        with:
          repository: m00qek/tree-sitter-ucode
          path: tree-sitter-ucode

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: ucode-lint/package-lock.json

      - name: Build grammar
        run: npm ci && npx tree-sitter build
        working-directory: tree-sitter-ucode

      - name: Install dependencies
        run: npm ci
        working-directory: ucode-lint

      - name: Run tests
        run: npm test
        working-directory: ucode-lint
