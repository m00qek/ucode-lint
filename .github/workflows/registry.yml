name: Publish Mason Registry

on:
  push:
    branches: [main]
    paths:
      - packages/**
      - package.json

jobs:
  publish:
    name: Publish registry.json.zip
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate registry.json
        run: node scripts/generate-registry.js

      - name: Zip registry
        run: zip registry.json.zip registry.json

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete registry-v1 --yes 2>/dev/null || true
          gh release create registry-v1 \
            --title "Mason Registry" \
            --notes "Auto-generated mason registry. Do not edit manually." \
            registry.json.zip
